<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mañana</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fff1a8);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{text-align:center}
.hint{margin-bottom:16px}

/* SOBRE */
.envelope{
  width:360px;
  height:240px;
  position:relative;
  cursor:pointer;
}

/* CUERPO DEL SOBRE */
.envelope-body{
  position:absolute;
  inset:0;
  background:#ff5fa2;
  border-radius:28px;
  box-shadow:0 30px 60px rgba(0,0,0,.3);
  z-index:1;
}

/* BOCA DEL SOBRE (CLAVE VISUAL) */
.envelope-mouth{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:110px;
  background:#ff5fa2;
  border-radius:0 0 28px 28px;
  z-index:4;
}

/* TAPA */
.envelope-flap{
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#ffd166,#fcbf49);
  clip-path:polygon(0 0,100% 0,50% 65%);
  transform-origin:top;
  transition:transform .8s ease;
  z-index:5;
}

/* TARJETA */
.card{
  position:absolute;
  left:24px;
  right:24px;
  bottom:20px;
  height:190px;
  background:#fffaf2;
  border-radius:20px;
  padding:22px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
  transform:translateY(140px); /* TOTALMENTE OCULTA */
  transition:transform .9s cubic-bezier(.2,.8,.2,1);
  z-index:2;
}

/* ABIERTO */
.envelope.open .envelope-flap{
  transform:rotateX(180deg);
}
.envelope.open .card{
  transform:translateY(-120px); /* SALE CLARO */
  z-index:3;
}

/* TEXTO */
h1{margin:0 0 8px}
p{margin:0;line-height:1.6}
.dots{margin:10px 0}
</style>
</head>

<body>

<div class="container">
  <div class="hint">Toca el sobre 💛✨</div>

  <div class="envelope" onclick="this.classList.toggle('open')">
    <div class="card">
      <h1>Mañana</h1>
      <div class="dots">💛 🎁 🎂 💛</div>
      <p>
        Si tú estás tranquila, yo no tanto 😅<br>
        Mañana cumple años alguien que es muy importante,<br>
        preciosa, linda, inteligente y muy especial.
      </p>
    </div>

    <div class="envelope-body"></div>
    <div class="envelope-mouth"></div>
    <div class="envelope-flap"></div>
  </div>
</div>

</body>
</html>
