<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faltan 2 días</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #2b1055);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255, 255, 255, 0.06);
  padding: 28px;
  border-radius: 18px;
  max-width: 360px;
  text-align: center;
  animation: fadeIn 1.2s ease;
}

h1 {
  color: #9d4edd;
}

p {
  line-height: 1.6;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>
  <div class="card">
    <h1>Faltan 2 días</h1>
    <p>
      No es casualidad.<br>
      Es solo el comienzo de algo bonito.
    </p>
    <p>🖤🌻</p>
  </div>
</body>
</html>
