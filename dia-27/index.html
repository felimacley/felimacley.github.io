<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mañana</title>

<!-- Tipografías -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: linear-gradient(135deg, #f7f3ff, #efe7fb);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #3a2f4f;
}

.card {
  background: #ffffff;
  padding: 44px 38px;
  border-radius: 26px;
  max-width: 460px;
  width: 90%;
  text-align: center;
  box-shadow: 0 30px 60px rgba(0,0,0,0.12);
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 600;
  margin: 0 0 22px 0;
}

.divider {
  width: 48px;
  height: 3px;
  background: #f4c430;
  margin: 0 auto 22px auto;
  border-radius: 3px;
}

p {
  font-size: 18px;
  line-height: 1.7;
  margin: 0;
}

.emojis {
  margin-top: 22px;
  font-size: 24px;
}
</style>
</head>

<body>

<div class="card">
  <h1>Mañana</h1>

  <div class="divider"></div>

  <p>
    Si tú estás tranquila, yo no tanto 😅<br>
    Mañana cumple años alguien que es muy preciosa, especial, linda y muy importante.
  </p>

  <div class="emojis">🌻 💛</div>
</div>

</body>
</html>
