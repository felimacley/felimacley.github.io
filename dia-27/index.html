<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un detalle</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #2b1055, #4a148c);
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* Girasoles */
.sunflower {
  position: absolute;
  font-size: 26px;
  opacity: 0.3;
  animation: float 16s linear infinite;
}

.sunflower:nth-child(1) { left: 15%; }
.sunflower:nth-child(2) { left: 50%; animation-duration: 20s; }
.sunflower:nth-child(3) { left: 75%; animation-duration: 18s; }

@keyframes float {
  from { transform: translateY(110vh) rotate(0deg); }
  to   { transform: translateY(-20vh) rotate(360deg); }
}

/* Tarjeta (VISIBLE DESDE EL INICIO) */
.card {
  background: rgba(255, 255, 255, 0.12);
  padding: 30px;
  border-radius: 22px;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
  animation: appear 1.2s ease;
}

@keyframes appear {
  from { transform: translateY(25px); }
  to   { transform: translateY(0); }
}

h1 {
  margin-top: 0;
  color: #ffd54f;
  font-size: 22px;
}

p {
  line-height: 1.6;
  font-size: 16px;
}

.emojis {
  font-size: 26px;
  margin-top: 14px;
}
</style>
</head>

<body>

<div class="sunflower">🌻</div>
<div class="sunflower">🌻</div>
<div class="sunflower">🌻</div>

<div class="card">
  <h1>Esta semana no es una semana cualquiera 😌</h1>
  <p>Se vienen cositas 🌻💛✨</p>
  <div class="emojis">😄🌻💛</div>
</div>

</body>
</html>
