<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mañana</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fff1a8);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.container{
  text-align:center;
}

.hint{
  margin-bottom:14px;
  font-size:16px;
}

/* SVG */
svg{
  width:360px;
  cursor:pointer;
}

/* CARTA */
#letter{
  transform:translateY(160px);
  opacity:0;
  transition:opacity .4s ease;
}

/* TEXTO */
.text text{
  fill:#333;
  text-anchor:middle;
  dominant-baseline:middle;
}

/* TAPA */
#flap{
  transform-origin:50% 0%;
  transition:transform .7s ease;
}

/* ANIMACIÓN */
.open #letter{
  opacity:1;
  animation:letterMove 1.5s ease forwards;
}

@keyframes letterMove{
  0%   { transform:translateY(160px); }
  60%  { transform:translateY(-120px); }
  100% { transform:translateY(-70px); }
}

/* Abrir tapa */
.open #flap{
  transform:rotateX(180deg);
}

/* CONFETI */
.confetti{
  position:fixed;
  top:-10px;
  width:10px;
  height:10px;
  animation:fall 3s linear forwards;
}
@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="hint">Toca el sobre 💛✨</div>

  <svg viewBox="0 0 360 240" onclick="openEnvelope(this)">

    <!-- CARTA (adelante) -->
    <g id="letter">
      <rect x="40" y="20" width="280" height="160" rx="18" fill="#fffaf2"/>
      <g class="text">
        <text x="180" y="55" font-size="22">Mañana</text>
        <text x="180" y="80" font-size="18">💛 🎁 🎂 💛</text>

        <text x="180" y="110" font-size="14">
          Si tú estás tranquila, yo no tanto 😅
        </text>
        <text x="180" y="130" font-size="14">
          Mañana cumple años alguien muy importante,
        </text>
        <text x="180" y="150" font-size="14">
          preciosa, linda, inteligente y muy especial.
        </text>
      </g>
    </g>

    <!-- CUERPO DEL SOBRE -->
    <rect x="20" y="60" width="320" height="160" rx="28" fill="#ff5fa2"/>
    <path d="M20 60 L180 140 L340 60 L340 220 L20 220 Z" fill="#ff5fa2"/>
