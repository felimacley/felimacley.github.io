<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mañana</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fff1a8);
  font-family:Arial, sans-serif;
}

.scene{
  position:relative;
  width:320px;
  height:260px;
  cursor:pointer;
}

/* SOBRE */
.envelope{
  position:absolute;
  bottom:0;
  width:100%;
  height:160px;
  background:#ff5fa2;
  border-radius:22px;
}

/* CARTA (NO EXISTE AL INICIO) */
.card{
  display:none;
  position:absolute;
  left:10%;
  width:80%;
  height:240px;
  background:#fffaf2;
  border-radius:18px;
  bottom:20px;
  box-shadow:0 18px 32px rgba(0,0,0,.22);
}

/* CUANDO SE ABRE */
.scene.open .card{
  display:block;
  transform:translateY(-70px);
  transition:transform 0.8s ease;
}
</style>
</head>

<body>

<div class="scene" onclick="this.classList.add('open')">
  <div class="card">
    <div style="padding:20px; text-align:center;">
      <strong>Mañana</strong><br><br>
      Si tú estás tranquila, yo no tanto 😅<br>
      Mañana cumple años alguien que es muy importante,<br>
      preciosa, linda, inteligente y muy especial.<br><br>
      🌻 💛 🎁 🎉 💛 🌻
    </div>
  </div>

  <div class="envelope"></div>
</div>

</body>
</html>
