<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mañana</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fff1a8);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:#4a235a;
}

.container{
  text-align:center;
}

.hint{
  margin-bottom:14px;
  font-size:16px;
}

/* ===== SOBRE SVG ===== */
svg{
  width:360px;
  cursor:pointer;
}

/* ===== CARTA ===== */
#letter{
  transform:translateY(120px);
  transition:transform 0.9s cubic-bezier(.2,.8,.2,1);
}

/* ===== TAPA ===== */
#flap{
  transform-origin:50% 0%;
  transition:transform 0.8s ease;
}

/* ===== ABIERTO ===== */
.open #letter{
  transform:translateY(-120px);
}

.open #flap{
  transform:rotateX(180deg);
}

/* ===== CONFETI ===== */
.confetti{
  position:fixed;
  top:-10px;
  width:10px;
  height:10px;
  animation:fall 3s linear forwards;
}
@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="hint">Toca el sobre 💛✨</div>

  <!-- SOBRE REAL CON SVG -->
  <svg viewBox="0 0 360 240" onclick="openEnvelope(this)">

    <!-- MÁSCARA: BOCA DEL SOBRE -->
    <defs>
      <clipPath id="pocket">
        <rect x="20" y="90" width="320" height="130" rx="20"/>
      </clipPath>
    </defs>

    <!-- CARTA (TOTALMENTE OCULTA) -->
    <g id="letter" clip-path="url(#pocket)">
      <rect x="40" y="20" width="280" height="160" rx="18" fill="#fffaf2"/>
      <text x="180" y="60" text-anchor="middle" font-size="22" font-family="serif">
        Mañana
      </text>
      <text x="180" y="85" text-anchor="middle" font-size="18">
        💛 🎁 🎂 💛
      </text>
      <text x="180" y="110" text-anchor="middle" font-size="14">
        Si tú estás tranquila, yo no tanto 😅
      </text>
      <text x="180" y="130" text-anchor="middle" font-size="14">
        Mañana cumple años alguien que es muy importante,
      </text>
      <text x="180" y="148" text-anchor="middle" font-size="14">
        preciosa, linda, inteligente y muy especial.
      </text>
    </g>

    <!-- CUERPO DEL SOBRE -->
    <rect x="20" y="60" width="320" height="160" rx="28" fill="#ff5fa2"/>

    <!-- FRENTE DEL SOBRE -->
    <path d="M20 60 L180 140 L340 60 L340 220 L20 220 Z" fill="#ff5fa2"/>

    <!-- TAPA -->
    <path id="flap"
          d="M20 60 L180 140 L340 60 Z"
          fill="#ffd166"/>

  </svg>
</div>

<script>
function openEnvelope(svg){
  if(svg.classList.contains('open')) return;
  svg.classList.add('open');

  for(let i=0;i<30;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.backgroundColor=['#ff5fa2','#ffd166','#fcbf49','#ffffff'][Math.floor(Math.random()*4)];
    c.style.animationDuration=2+Math.random()*2+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}
</script>

</body>
</html>
