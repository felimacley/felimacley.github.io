<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un detalle</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #3a1c71, #5f259f);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.card {
  background: rgba(255,255,255,0.15);
  padding: 32px;
  border-radius: 24px;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

h1 {
  font-size: 22px;
  margin-bottom: 14px;
  color: #ffd54f;
}

p {
  font-size: 17px;
  line-height: 1.6;
  margin: 0;
}

.emojis {
  margin-top: 18px;
  font-size: 26px;
}
</style>
</head>

<body>

<div class="card">
  <h1>Esta semana no es una semana cualquiera 😌</h1>
  <p>Se vienen cositas 🌻💛✨</p>
  <div class="emojis">😄🌻💛🌻</div>
</div>

</body>
</html>
