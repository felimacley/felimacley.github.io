<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mañana</title>

  <!-- Tipografías (bien cargadas) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#ff9a9e;
      --bg2:#fad0c4;
      --bg3:#fff1a8;

      --pink:#ff5fa2;
      --pink2:#ff3f97;
      --gold:#ffd166;
      --gold2:#fcbf49;

      --paper:#fffaf2;
      --ink:#4a235a;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
      font-family:"Poppins",system-ui,-apple-system,Segoe UI,Arial,sans-serif;
      color:var(--ink);
      overflow:hidden;
    }

    .wrap{
      text-align:center;
      width:min(520px, 92vw);
    }

    .hint{
      font-size:16px;
      margin-bottom:14px;
      opacity:.9;
    }

    /* Escena */
    .scene{
      position:relative;
      width:min(420px, 92vw);
      margin:0 auto;
      aspect-ratio: 7 / 5;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Clickable */
    .scene button{
      all:unset;
      cursor:pointer;
      display:block;
      width:100%;
      height:100%;
    }

    /* Sobre SVG */
    .env{
      position:absolute;
      inset:0;
      filter: drop-shadow(0 26px 36px rgba(0,0,0,.22));
    }

    /* Bolsillo (recorta la carta al inicio) */
    .pocket{
      position:absolute;
      left:7%;
      right:7%;
      bottom:12%;
      height:46%;
      overflow:hidden;              /* CLAVE: la carta no se ve antes */
      pointer-events:none;
      z-index:3;
    }

    /* Carta */
    .letter{
      position:absolute;
      left:0;
      right:0;
      bottom:-120%;                 /* CLAVE: 100% escondida al inicio */
      height:170%;
      transform:translateY(0);
    }

    .paper{
      width:100%;
      height:100%;
      background:var(--paper);
      border-radius:18px;
      box-shadow:0 18px 32px rgba(0,0,0,.18);
      padding:22px 18px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:10px;
    }

    .paper h1{
      margin:0;
      font-family:"Cormorant Garamond",serif;
      font-size:28px;
      letter-spacing:.2px;
    }

    .dots{
      font-size:22px;
      margin-top:-6px;
    }

    .paper p{
      margin:0;
      font-size:16px;
      line-height:1.45;
    }

    .emojis{
      font-size:24px;
      margin-top:6px;
    }

    /* El texto aparece al final */
    .paper .reveal{
      opacity:0;
      transform:translateY(6px);
      transition:opacity .35s ease, transform .35s ease;
    }

    /* ====== ANIMACIÓN POR FASES ====== */

    /* Fase 1: la carta “sale” desde dentro (aún recortada por pocket) */
    .scene.opening .letter{
      animation: popOut 1.05s cubic-bezier(.2,.9,.2,1) forwards;
    }
    @keyframes popOut{
      0%   { transform: translateY(0); }
      70%  { transform: translateY(-78%); }  /* sube bastante (sale) */
      100% { transform: translateY(-64%); }  /* queda arriba un momento */
    }

    /* Fase 2: la carta “baja” y se posa ENCIMA del sobre */
    .scene.final .pocket{
      overflow:visible;            /* deja de recortar: ya está fuera */
    }
    .scene.final .letter{
      transform: translateY(-44%); /* baja un poco: se posa encima */
      transition: transform .55s cubic-bezier(.2,.9,.2,1);
      z-index:6;
    }
    .scene.final .paper .reveal{
      opacity:1;
      transform:translateY(0);
    }

    /* Confeti */
    .confetti{
      position:fixed;
      top:-12px;
      width:10px;
      height:10px;
      border-radius:2px;
      animation: fall 3.2s linear forwards;
      pointer-events:none;
      opacity:.95;
    }
    @keyframes fall{
      to{
        transform: translateY(110vh) rotate(720deg);
        opacity:0;
      }
    }

    /* Responsive: en móvil sube tamaños */
    @media (max-width:420px){
      .paper{ padding:20px 16px; }
      .paper h1{ font-size:26px; }
      .paper p{ font-size:15px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="hint">Toca el sobre 💛✨</div>

    <div id="scene" class="scene">
      <button aria-label="Abrir sobre">
        <!-- Carta (HTML) -->
        <div class="pocket">
          <div class="letter">
            <div class="paper">
              <div class="reveal">
                <h1>Mañana</h1>
                <div class="dots">💛 🎁 🎂 💛</div>
                <p>
                  Si tú estás tranquila, yo no tanto 😅<br>
                  Mañana cumple años alguien que es muy importante,<br>
                  preciosa, linda, inteligente y muy especial.
                </p>
                <div class="emojis">🌻 💛 🎉 🌻</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Sobre (SVG bonito) -->
        <svg class="env" viewBox="0 0 700 500" preserveAspectRatio="xMidYMid meet">
          <!-- Cuerpo -->
          <rect x="70" y="140" width="560" height="320" rx="60" fill="var(--pink)"/>
          <!-- Sombra interior -->
          <rect x="70" y="140" width="560" height="320" rx="60" fill="url(#shine)" opacity=".25"/>

          <!-- Laterales “plegados” -->
          <path d="M70 170 L350 315 L70 460 Z" fill="var(--pink2)" opacity=".22"/>
          <path d="M630 170 L350 315 L630 460 Z" fill="var(--pink2)" opacity=".22"/>

          <!-- Boca del sobre (frente) -->
          <path d="M70 170 L350 335 L630 170 L630 460 L70 460 Z" fill="var(--pink)"/>

          <!-- Tapa -->
          <path id="flap" d="M70 170 L350 335 L630 170 Z" fill="url(#gold)"/>

          <defs>
            <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="var(--gold)"/>
              <stop offset="1" stop-color="var(--gold2)"/>
            </linearGradient>
            <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#ffffff"/>
              <stop offset="1" stop-color="#000000"/>
            </linearGradient>
          </defs>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');

    function confettiBurst(){
      const colors = ['#ff5fa2','#ffd166','#fcbf49','#ffffff','#ff3f97'];
      for(let i=0;i<28;i++){
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = (Math.random()*100) + 'vw';
        c.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        c.style.animationDuration = (2.2 + Math.random()*1.6) + 's';
        c.style.width = (8 + Math.random()*6) + 'px';
        c.style.height = (8 + Math.random()*6) + 'px';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(), 4200);
      }
    }

    scene.querySelector('button').addEventListener('click', () => {
      if(scene.classList.contains('opening') || scene.classList.contains('final')) return;

      // Fase 1: sale
      scene.classList.add('opening');
      confettiBurst();

      // Fase 2: baja y se posa + aparece texto
      // (sin tiempos “mágicos” eternos: lo sincronizamos a la animación)
      setTimeout(() => {
        scene.classList.remove('opening');
        scene.classList.add('final');
      }, 1050);
    });
  </script>
</body>
</html>
