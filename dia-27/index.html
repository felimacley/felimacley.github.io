<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un detalle</title>

<!-- Tipografías elegantes (BIEN CARGADAS) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: linear-gradient(135deg, #f7f3ff, #efe7fb);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #3a2f4f;
}

/* Tarjeta */
.card {
  background: #ffffff;
  padding: 44px 38px;
  border-radius: 26px;
  max-width: 460px;
  width: 90%;
  text-align: center;
  box-shadow: 0 30px 60px rgba(0,0,0,0.12);
}

/* Título */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 600;
  margin: 0 0 22px 0;
}

/* Línea decorativa */
.divider {
  width: 48px;
  height: 3px;
  background: #f4c430;
  margin: 0 auto 22px auto;
  border-radius: 3px;
}

/* Texto principal */
p {
  font-size: 18px;
  line-height: 1.7;
  margin: 0;
}

/* Emojis suaves */
.emojis {
  margin-top: 22px;
  font-size: 24px;
}

/* Regalos destacados */
.gifts {
  margin-top: 14px;
  font-size: 32px;
}
</style>
</head>

<body>

<div class="card">
  <h1>Esta semana no es una semana cualquiera 😌</h1>

  <div class="divider"></div>

  <p>Se vienen cositas</p>

  <div class="emojis">🌻 💛 ✨</div>
  <div class="gifts">🎁 🎂 🎉</div>
</div>

</body>
</html>
