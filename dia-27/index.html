<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mañana</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fff1a8);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:#4a235a;
}

.container{text-align:center}

.hint{
  margin-bottom:18px;
  font-size:16px;
}

/* SOBRE */
.envelope{
  width:340px;
  height:230px;
  background:#ff5fa2;
  border-radius:26px;
  position:relative;
  box-shadow:0 30px 60px rgba(0,0,0,.3);
  cursor:pointer;
  overflow:hidden;
}

/* TAPA */
.envelope::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#ffd166,#fcbf49);
  clip-path:polygon(0 0,100% 0,50% 65%);
  transform-origin:top;
  transition:transform .8s ease;
  z-index:3;
}

/* TARJETA */
.card{
  position:absolute;
  left:20px;
  right:20px;
  bottom:20px;
  height:190px;
  background:#fffaf2;
  border-radius:20px;
  padding:24px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
  transform:translateY(140px);
  transition:transform .9s cubic-bezier(.2,.8,.2,1);
  z-index:2;
}

/* ABIERTO */
.envelope.open::before{
  transform:rotateX(180deg);
}
.envelope.open .card{
  transform:translateY(-120px);
}

/* TEXTO */
h1{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  margin:0 0 8px;
}
.dots{
  font-size:22px;
  margin-bottom:14px;
}
p{
  font-size:16px;
  line-height:1.6;
  margin:0;
}
.emojis{
  margin-top:16px;
  font-size:24px;
}

/* CONFETI */
.confetti{
  position:fixed;
  top:-10px;
  width:10px;
  height:10px;
  background:red;
  animation:fall 3s linear forwards;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg);opacity:0}
}
</style>
</head>

<body>

<div class="container">
  <div class="hint">Toca el sobre 💛✨</div>

  <div class="envelope" onclick="openEnvelope(this)">
    <div class="card">
      <h1>Mañana</h1>
      <div class="dots">💛 🎁 🎂 💛</div>
      <p>
        Si tú estás tranquila, yo no tanto 😅<br>
        Mañana cumple años alguien que es muy importante, espreciosa, linda,inteligente y muy especial.
      </p>
      <div class="emojis">🌻🌻 💛 🎉 🌻 💛 🌻 💛 🎉 🌻🎉 🌻</div>
    </div>
  </div>
</div>

<script>
function openEnvelope(el){
  if(el.classList.contains('open')) return;
  el.classList.add('open');

  for(let i=0;i<30;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.backgroundColor=['#ff5fa2','#ffd166','#fcbf49','#ffffff'][Math.floor(Math.random()*4)];
    c.style.animationDuration=2+Math.random()*2+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}
</script>

</body>
</html>
