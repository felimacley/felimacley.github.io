<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un detalle</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #3b1d5a, #7b3fa1);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #ffffff;
}

.card {
  background: rgba(255, 255, 255, 0.18);
  padding: 36px 32px;
  border-radius: 28px;
  max-width: 420px;
  text-align: center;
  box-shadow:
    0 25px 50px rgba(0, 0, 0, 0.25),
    inset 0 0 0 1px rgba(255,255,255,0.15);
}

h1 {
  font-size: 22px;
  margin-bottom: 18px;
  color: #ffe082;
}

p {
  font-size: 18px;
  line-height: 1.7;
  margin: 0;
}

.divider {
  width: 60px;
  height: 3px;
  background: #ffd54f;
  margin: 18px auto;
  border-radius: 3px;
}

.emojis {
  margin-top: 22px;
  font-size: 28px;
}
</style>
</head>

<body>

<div class="card">
  <h1>Esta semana no es una semana cualquiera 😌</h1>

  <div class="divider"></div>

  <p>Se vienen cositas 🌻💛✨</p>

  <div class="emojis">🌻💛🌻</div>
</div>

</body>
</html>
