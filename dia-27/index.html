<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mañana</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fff1a8);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  text-align:center;
}

.hint{
  margin-bottom:16px;
}

/* SOBRE */
.envelope{
  position:relative;
  width:320px;
  height:200px;
  cursor:pointer;
}

/* CUERPO */
.body{
  position:absolute;
  bottom:0;
  width:100%;
  height:140px;
  background:#ff5fa2;
  border-radius:20px;
  z-index:2;
}

/* TAPA */
.flap{
  position:absolute;
  top:60px;
  width:100%;
  height:80px;
  background:#ffd166;
  clip-path:polygon(0 0, 50% 100%, 100% 0);
  transform-origin:top;
  transition:transform .6s ease;
  z-index:3;
}

/* CARTA */
.letter{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translate(-50%, 120px);
  width:260px;
  height:150px;
  background:#fffaf2;
  border-radius:16px;
  padding:16px;
  box-sizing:border-box;
  text-align:center;
  opacity:0;
  transition:opacity .4s ease;
  z-index:1;
}

/* TEXTO */
.letter h2{
  margin:0;
}
.letter p{
  font-size:14px;
  margin:8px 0 0;
}

/* ANIMACIÓN */
.open .flap{
  transform:rotateX(180deg);
}

.open .letter{
  transform:translate(-50%, -60px);
  opacity:1;
  z-index:4;
}
</style>
</head>

<body>

<div class="container">
  <div class="hint">Toca el sobre 💛✨</div>

  <div class="envelope" onclick="this.classList.add('open')">
    <div class="letter">
      <h2>Mañana</h2>
      <p>💛 🎁 🎂 💛</p>
      <p>
        Si tú estás tranquila, yo no tanto 😅<br>
        Mañana cumple años alguien muy importante,<br>
        preciosa, linda, inteligente y muy especial.
      </p>
    </div>

    <div class="body"></div>
    <div class="flap"></div>
  </div>
</div>

</body>
</html>
