<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz cumpleaños 🎂</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#ffecd2,#fcb69f,#ffdde1);
  color:#4a235a;
  overflow-x:hidden;
}

/* CONTENEDOR PRINCIPAL */
.wrapper{
  padding:40px 20px 60px;
  text-align:center;
}

/* EMOJIS FLOTANTES */
.floating{
  position:fixed;
  top:-20px;
  font-size:20px;
  animation:floatDown 12s linear infinite;
  opacity:0.6;
}

@keyframes floatDown{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

/* MENSAJE */
.message{
  max-width:420px;
  margin:0 auto 30px;
  background:#fffaf2;
  padding:28px 24px;
  border-radius:26px;
  box-shadow:0 24px 50px rgba(0,0,0,.2);
}

.message h1{
  margin-top:0;
}

.message p{
  line-height:1.5;
  font-size:15px;
}

/* BOTÓN */
button{
  margin-top:22px;
  padding:12px 22px;
  font-size:15px;
  border:none;
  border-radius:20px;
  background:#ff5fa2;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#ff3f97;
}

/* COLLAGE (OCULTO AL INICIO) */
.collage{
  display:none;
  max-width:460px;
  margin:40px auto 0;
  background:#fffaf2;
  padding:22px;
  border-radius:28px;
  box-shadow:0 24px 50px rgba(0,0,0,.25);
  animation:appear 0.9s ease forwards;
}

/* GRID COLLAGE */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.grid img{
  width:100%;
  border-radius:18px;
  object-fit:cover;
}

/* FOTOS GRANDES */
.big{
  grid-column:span 2;
}

/* ANIMACIÓN */
@keyframes appear{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* CONFETI */
.confetti{
  position:fixed;
  top:-10px;
  width:10px;
  height:10px;
  animation:fall 3s linear forwards;
  opacity:.9;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- MENSAJE INICIAL -->
  <div class="message">
    <h1>Feliz cumpleaños 🎂</h1>
    <p>
      Hoy no es un día cualquiera.<br>
      Ojalá este día sea maravilloso,<br>
      lleno de sonrisas, detalles lindos<br>
      y momentos que se queden contigo.
    </p>
    <p>
      Este es solo un pequeño detalle…<br>
      lo mejor viene cuando tú quieras 💛✨
    </p>

    <button onclick="showCollage()">Toca aquí 💛</button>
  </div>

  <!-- COLLAGE -->
  <div id="collage" class="collage">
    <div class="grid">
      <img src="1.jpeg" class="big" alt="">
      <img src="2.jpeg" class="big" alt="">
      <img src="3.jpeg" alt="">
      <img src="4.jpeg" alt="">
    </div>

    <div style="margin-top:18px; font-size:22px;">
      🥰 💛 ✨
    </div>
  </div>

</div>

<script>
function showCollage(){
  const c = document.getElementById('collage');
  if(c.style.display === 'block') return;
  c.style.display = 'block';

  // CONFETI
  const colors = ['#ff5fa2','#ffd166','#fcbf49','#ffffff'];
  for(let i=0;i<70;i++){
    const conf=document.createElement('div');
    conf.className='confetti';
    conf.style.left=Math.random()*100+'vw';
    conf.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
    conf.style.animationDuration=(2+Math.random()*2)+'s';
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),5000);
  }
}

// Emojis flotantes
const emojis = ['🌻','💛','🎁','🎉','✨'];
for(let i=0;i<15;i++){
  const e=document.createElement('div');
  e.className='floating';
  e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  e.style.left=Math.random()*100+'vw';
  e.style.animationDuration=(8+Math.random()*6)+'s';
  document.body.appendChild(e);
}
</script>

</body>
</html>
