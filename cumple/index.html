<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz cumpleaños 🎂</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, Helvetica, sans-serif;
  color:#4a235a;
  overflow-x:hidden;

  /* FONDO KUROMI EN MOSAICO */
  background-color:#e9d9ff;
  background-image:
    url("kuromi1.webp"),
    url("kuromi2.webp");
  background-repeat:repeat;
  background-size:180px;
}

/* EMOJIS FLOTANTES */
.floating{
  position:fixed;
  top:-20px;
  font-size:22px;
  animation:floatDown 14s linear infinite;
  opacity:0.7;
  pointer-events:none;
}

@keyframes floatDown{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

/* CONTENEDOR */
.wrapper{
  padding:40px 20px 60px;
  text-align:center;
}

/* MENSAJE */
.message{
  max-width:420px;
  margin:0 auto 30px;
  background:#fffaf2;
  padding:28px 24px;
  border-radius:26px;
  box-shadow:0 24px 50px rgba(0,0,0,.2);
}

.message h1{ margin-top:0; }
.message p{ line-height:1.5; font-size:15px; }

/* BOTÓN */
button{
  margin-top:22px;
  padding:12px 22px;
  font-size:15px;
  border:none;
  border-radius:20px;
  background:#8b5cf6;
  color:white;
  cursor:pointer;
}

button:hover{ background:#7c3aed; }

/* COLLAGE */
.collage{
  display:none;
  max-width:460px;
  margin:40px auto 0;
  background:#fffaf2;
  padding:22px;
  border-radius:28px;
  box-shadow:0 24px 50px rgba(0,0,0,.25);
  animation:appear .9s ease forwards;
}

@keyframes appear{
  from{ opacity:0; transform:translateY(20px); }
  to{ opacity:1; transform:translateY(0); }
}

/* GRID DEL COLLAGE (CORREGIDO) */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  align-items:stretch;
}

.grid img{
  width:100%;
  border-radius:18px;
  object-fit:cover;
}

/* FOTOS GRANDES */
.big{
  grid-column:span 2;
}

/* INUYASHA EN EL HUECO */
.anime-box{
  grid-column:span 2;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f6f0ff;
  border-radius:18px;
  padding:16px;
}

.anime-box img{
  width:140px;
  max-width:80%;
  border-radius:16px;
  box-shadow:0 10px 20px rgba(0,0,0,.2);
}

/* EMOJIS FINALES */
.emojis-final{
  margin-top:14px;
  font-size:22px;
  text-align:center;
}

/* CONFETI */
.confetti{
  position:fixed;
  top:-10px;
  width:10px;
  height:10px;
  animation:fall 3s linear forwards;
  opacity:.9;
  pointer-events:none;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- MENSAJE -->
  <div class="message">
    <h1>Feliz cumpleaños 🎂</h1>
    <p>
      Hoy no es un día cualquiera.<br>
      Ojalá este día sea maravilloso,<br>
      lleno de sonrisas, detalles lindos<br>
      y momentos que se queden contigo.
    </p>
    <p>
      Este es solo un pequeño detalle…<br>
      lo mejor viene cuando tú quieras 💛✨
    </p>

    <button onclick="showCollage()">Toca aquí 💛</button>
  </div>

  <!-- COLLAGE -->
  <div id="collage" class="collage">
    <div class="grid">
      <img src="1.jpeg" class="big">
      <img src="2.jpeg" class="big">
      <img src="3.jpeg">
      <img src="4.jpeg">

      <!-- AQUÍ VA LA IMAGEN DEL CÍRCULO VERDE -->
      <div class="anime-box">
        <img src="inuysha.jpg" alt="Inuyasha y Aome">
      </div>
    </div>

    <div class="emojis-final">
      🥰 💛 ✨
    </div>
  </div>

</div>

<script>
function showCollage(){
  const c = document.getElementById('collage');
  if(c.style.display === 'block') return;
  c.style.display = 'block';

  const colors = ['#8b5cf6','#ffd166','#fcbf49','#ffffff'];
  for(let i=0;i<80;i++){
    const conf=document.createElement('div');
    conf.className='confetti';
    conf.style.left=Math.random()*100+'vw';
    conf.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
    conf.style.animationDuration=(2+Math.random()*2)+'s';
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),5000);
  }
}

/* EMOJIS FLOTANTES */
const emojis = ['🌻','💛','🎁','🎉','✨','🖤'];
for(let i=0;i<25;i++){
  const e=document.createElement('div');
  e.className='floating';
  e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  e.style.left=Math.random()*100+'vw';
  e.style.animationDuration=(10+Math.random()*8)+'s';
  document.body.appendChild(e);
}
</script>

</body>
</html>
